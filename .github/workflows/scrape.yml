name: Shopify Store Scraper

on:
  schedule:
    - cron: "0 3 * * 1,4" # Monday and Thursday at 3am UTC
  workflow_dispatch:
    inputs:
      limit:
        description: "Max stores to discover and process"
        required: false
        default: "1000"
      source:
        description: "Discovery source (all, seeds, app-reviews)"
        required: false
        default: "all"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install scraper dependencies
        working-directory: scraper
        run: npm ci

      - name: Seed known apps (if needed)
        working-directory: scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx tsx src/seed-apps.ts

      - name: Run full scraper pipeline
        working-directory: scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          LIMIT="${{ github.event.inputs.limit || '1000' }}"
          SOURCE="${{ github.event.inputs.source || 'all' }}"
          echo "Running scraper: source=$SOURCE, limit=$LIMIT"
          npx tsx src/index.ts full --limit "$LIMIT" --source "$SOURCE"

      - name: Notify app on success
        if: success() && vars.APP_URL != ''
        env:
          APP_URL: ${{ vars.APP_URL }}
          SCRAPER_SECRET: ${{ secrets.SCRAPER_SECRET }}
        run: |
          curl -s -X POST "${APP_URL}/api/scraper/webhook" \
            -H "Authorization: Bearer ${SCRAPER_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{"status": "completed"}' || true

      - name: Notify app on failure
        if: failure() && vars.APP_URL != ''
        env:
          APP_URL: ${{ vars.APP_URL }}
          SCRAPER_SECRET: ${{ secrets.SCRAPER_SECRET }}
        run: |
          curl -s -X POST "${APP_URL}/api/scraper/webhook" \
            -H "Authorization: Bearer ${SCRAPER_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{"status": "failed", "errorMessage": "GitHub Actions job failed — check workflow logs"}' || true
